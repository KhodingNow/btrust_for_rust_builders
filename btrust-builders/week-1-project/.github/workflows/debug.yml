name: Debug Structure

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: List all files
      run: |
        echo "Current directory: $(pwd)"
        echo "=== Root directory contents ==="
        ls -la
        echo "=== Find Cargo.toml ==="
        find . -name "Cargo.toml" -type f
        echo "=== Git tracked files ==="
        git ls-files
        echo "=== Git status ==="
        git status
